version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: hotel_monitor_postgres
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
      POSTGRES_DB: hotel_monitor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hotel_monitor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: hotel_monitor_backend
    environment:
      DATABASE_URL: postgresql+psycopg://hotel:hotel@postgres:5432/hotel_monitor
      JWT_SECRET_KEY: dev-secret-change-me
      JWT_EXPIRE_MINUTES: 720
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
    container_name: hotel_monitor_celery_worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://hotel:hotel@postgres:5432/hotel_monitor
      JWT_SECRET_KEY: dev-secret-change-me
      JWT_EXPIRE_MINUTES: 720
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pg_data:
  redis_data:
